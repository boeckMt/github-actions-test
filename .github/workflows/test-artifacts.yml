name: Test Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: rm -f .npmrc
      - run: npm ci
      - run: npx ng build test-lib --configuration=production
      - run: npx ng build test-lib2 --configuration=production
      - run: npx ng build test-lib3 --configuration=production
      - name: Github script for package.json
        uses: actions/github-script@v8
        id: adjust-package
        with:
          script: |
            const script = require('./scripts/adjust-package-json.js');
            const path = './dist/test-lib/package.json';
            const path2 = './dist/test-lib2/package.json';
            const path3 = './dist/test-lib3/package.json';

            script({github, context}, path, (json)=>{
              json.scripts = {
                "testexit": "node --eval \"console.log('test script should not exit process.\\n')\""
              };
              return json;
            });
            script({github, context}, path2, (json)=>{
              json.scripts = {
                "testexit": "node --eval \"console.log('test script should not exit process.\\n')\""
              };
              return json;
            });
            script({github, context}, path3, (json)=>{
              json.scripts = {
                "testexit": "node --eval \"console.log('test script should not exit process.\\n')\""
              };
              return json;
            });
      - run: |
          for dir in ./dist/*/
          do
              dir=${dir%*/}
              ls "$dir" -la
          done
      # https://docs.github.com/de/actions/writing-workflows/choosing-what-your-workflow-does/storing-and-sharing-data-from-a-workflow
      - name: Archive dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "dist"
          path: dist
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download dist result from job build
        uses: actions/download-artifact@v4
        with:
          name: "dist"
          path: dist
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: rm -f .npmrc
      - run: npm ci
      - run: |
          for dir in ./dist/*/     # list directories in the form "/tmp/dirname/"
          do
              dir=${dir%*/}
              node ./scripts/update-package.js --path="$dir"
          done
      - name: Archive adjusted dist with artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "dist2"
          path: dist
